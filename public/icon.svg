<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="110" fill="url(#g)"/>
  <!-- Card body -->
  <rect x="96" y="160" width="320" height="200" rx="22" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="3"/>
  <!-- Chip -->
  <rect x="130" y="200" width="52" height="40" rx="7" fill="rgba(255,255,255,0.5)"/>
  <!-- Stripe -->
  <rect x="96" y="220" width="320" height="36" fill="rgba(0,0,0,0.18)"/>
  <!-- Card lines -->
  <rect x="130" y="296" width="180" height="10" rx="5" fill="rgba(255,255,255,0.6)"/>
  <rect x="130" y="318" width="100" height="8" rx="4" fill="rgba(255,255,255,0.35)"/>
  <!-- Dollar sign -->
  <text x="390" y="350" font-family="system-ui,sans-serif" font-weight="800" font-size="52" fill="rgba(255,255,255,0.7)" text-anchor="middle">$</text>
</svg>
